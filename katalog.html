<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐎 Stajnia Strawberry — Katalog Koni</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐎</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dirt:      #1a1208;
      --saddle:    #2e1a0e;
      --leather:   #4a2c14;
      --rust:      #7a3b1e;
      --amber:     #c47a2b;
      --gold:      #d4a24e;
      --pale-gold: #e8c97a;
      --cream:     #f0e6c8;
      --dust:      #c8b080;
      --red:       #8b2020;
      --font-title:'Cinzel Decorative', serif;
      --font-head: 'Cinzel', serif;
      --font-body: 'IM Fell English', serif;
      --font-type: 'Special Elite', cursive;
    }

    html, body {
      height: 100%;
      background: var(--dirt);
      color: var(--cream);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── GRAIN ── */
    body::before {
      content:''; position:fixed; inset:0; z-index:1000; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity:0.3;
    }

    /* ── LAYOUT ── */
    .page {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: 100vh;
      position: relative; z-index: 1;
    }

    /* ══════════════════════════════════════
       LEWA STRONA — LOGOWANIE
    ══════════════════════════════════════ */
    .left-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background:
        linear-gradient(180deg, #0d0800 0%, #1e1005 50%, #0a0600 100%);
      border-right: 1px solid var(--amber);
      position: relative;
      overflow: hidden;
    }

    /* Dekoracyjna linia po prawej stronie panelu */
    .left-panel::after {
      content:'';
      position:absolute; top:0; right:0; width:2px; height:100%;
      background: linear-gradient(180deg, transparent, var(--amber), var(--pale-gold), var(--amber), transparent);
    }

    /* Tło — subtelny wzór */
    .left-panel::before {
      content:'';
      position:absolute; inset:0; pointer-events:none;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(212,162,78,0.03) 40px, rgba(212,162,78,0.03) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(212,162,78,0.02) 40px, rgba(212,162,78,0.02) 41px);
    }

    .login-box {
      position: relative;
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border: 1px solid var(--amber);
      background: linear-gradient(180deg, rgba(30,16,5,0.95), rgba(11,7,1,0.98));
      box-shadow:
        0 0 0 3px var(--leather),
        0 0 0 5px var(--amber),
        0 0 40px rgba(196,122,43,0.25),
        inset 0 0 30px rgba(0,0,0,0.5);
    }
    .login-box::before, .login-box::after {
      content:'✦'; position:absolute; top:0.5rem; font-size:0.85rem; color:var(--amber);
    }
    .login-box::before { left:0.7rem; }
    .login-box::after  { right:0.7rem; }

    .login-seal {
      width:80px; height:80px; border-radius:50%;
      border:3px solid var(--amber);
      background: radial-gradient(circle, var(--leather) 0%, var(--saddle) 100%);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 1.25rem;
      font-size:2.2rem;
      box-shadow: 0 0 20px rgba(196,122,43,0.5);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ box-shadow:0 0 20px rgba(196,122,43,0.4); }
      50%    { box-shadow:0 0 35px rgba(196,122,43,0.7); }
    }

    .login-title {
      font-family: var(--font-title);
      font-size: 1.3rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(212,162,78,0.5);
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .login-sub {
      font-family: var(--font-type);
      font-size: 0.72rem;
      color: var(--dust);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.75rem;
    }
    .login-divider {
      display:flex; align-items:center; gap:0.5rem;
      margin-bottom:1.25rem; color:var(--amber); font-size:0.65rem;
    }
    .login-divider::before, .login-divider::after {
      content:''; flex:1; height:1px; background:var(--amber); opacity:0.4;
    }

    .login-input {
      width:100%; padding:0.75rem 0.9rem;
      border:1px solid rgba(196,122,43,0.4);
      background:rgba(10,5,0,0.6);
      color:var(--cream);
      font-family:var(--font-type);
      font-size:0.85rem;
      outline:none;
      transition:border-color 0.2s;
      margin-bottom:0.65rem;
    }
    .login-input:focus { border-color:var(--amber); }
    .login-input::placeholder { color:rgba(200,176,128,0.4); }

    .login-submit {
      width:100%; padding:0.85rem;
      background:linear-gradient(135deg, var(--rust), var(--leather));
      border:1px solid var(--amber);
      color:var(--pale-gold);
      font-family:var(--font-head);
      font-size:0.85rem;
      font-weight:700;
      letter-spacing:0.2em;
      text-transform:uppercase;
      cursor:pointer;
      transition:all 0.25s;
    }
    .login-submit:hover {
      background:linear-gradient(135deg, var(--amber), var(--rust));
      box-shadow:0 0 20px rgba(196,122,43,0.4);
    }

    .login-error {
      background:rgba(139,32,32,0.2);
      border:1px solid var(--red);
      color:#c94040;
      font-family:var(--font-type);
      font-size:0.75rem;
      padding:0.5rem 0.75rem;
      margin-bottom:0.65rem;
      display:none;
    }
    .login-footer {
      margin-top:1rem;
      font-family:var(--font-type);
      font-size:0.65rem;
      color:rgba(200,176,128,0.3);
    }

    /* Link do panelu */
    .panel-link {
      display:block;
      margin-top:1.25rem;
      padding:0.6rem 1rem;
      border:1px solid rgba(196,122,43,0.25);
      color:var(--dust);
      font-family:var(--font-type);
      font-size:0.7rem;
      text-align:center;
      text-decoration:none;
      letter-spacing:0.1em;
      transition:all 0.2s;
    }
    .panel-link:hover { border-color:var(--amber); color:var(--gold); }

    /* ══════════════════════════════════════
       PRAWA STRONA — KATALOG KONI
    ══════════════════════════════════════ */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, #1e0e02 0%, transparent 70%),
        linear-gradient(180deg, #120900 0%, #0d0800 100%);
    }

    /* Nagłówek katalogu */
    .catalog-header {
      padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid rgba(196,122,43,0.25);
      flex-shrink: 0;
      background: rgba(0,0,0,0.2);
    }
    .catalog-title {
      font-family: var(--font-title);
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      color: var(--gold);
      text-shadow: 0 0 20px rgba(196,122,43,0.4);
      line-height: 1.1;
    }
    .catalog-subtitle {
      font-family: var(--font-type);
      font-size: 0.7rem;
      color: var(--dust);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* Nawigacja kategorii */
    .cat-nav {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-bottom: 1px solid rgba(196,122,43,0.15);
      flex-shrink: 0;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.15);
    }
    .cat-btn {
      padding: 0.4rem 1rem;
      border: 1px solid rgba(196,122,43,0.3);
      background: transparent;
      color: var(--dust);
      font-family: var(--font-head);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn:hover, .cat-btn.active {
      border-color: var(--amber);
      color: var(--pale-gold);
      background: rgba(196,122,43,0.1);
    }
    .cat-btn.active {
      box-shadow: 0 0 10px rgba(196,122,43,0.2);
    }

    /* Siatka koni */
    .horses-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 2rem 2rem;
    }

    .category-label {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(196,122,43,0.2);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .category-label::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(90deg, rgba(196,122,43,0.3), transparent);
    }

    .horses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .horse-card {
      border: 1px solid rgba(196,122,43,0.2);
      background: linear-gradient(160deg, rgba(30,16,5,0.9), rgba(10,6,1,0.95));
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .horse-card:hover {
      border-color: var(--amber);
      box-shadow: 0 0 20px rgba(196,122,43,0.2);
      transform: translateY(-2px);
    }
    .horse-card.legendary {
      border-color: rgba(180,130,255,0.5);
      background: linear-gradient(160deg, rgba(40,20,60,0.9), rgba(10,5,20,0.95));
    }
    .horse-card.legendary:hover {
      border-color: #b07ae8;
      box-shadow: 0 0 20px rgba(122,74,191,0.3);
    }

    .horse-img-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .horse-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
      filter: brightness(0.95) contrast(1.05);
    }
    .horse-card:hover .horse-img-wrap img {
      transform: scale(1.06);
    }

    .horse-info {
      padding: 0.65rem 0.85rem 0.75rem;
      border-top: 1px solid rgba(196,122,43,0.15);
    }
    .horse-name {
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 0.2rem;
    }
    .horse-coat {
      font-family: var(--font-type);
      font-size: 0.65rem;
      color: var(--dust);
      letter-spacing: 0.08em;
    }
    .horse-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      padding: 0.15rem 0.5rem;
      font-family: var(--font-head);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .badge-legendary {
      background: rgba(122,74,191,0.7);
      border: 1px solid #b07ae8;
      color: #d4b0ff;
    }

    /* Modal podglądu */
    .horse-modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; visibility: hidden;
      transition: all 0.25s ease;
    }
    .horse-modal-overlay.open {
      opacity: 1; visibility: visible;
    }
    .horse-modal {
      width: min(700px, 95vw);
      max-height: 90vh;
      background: linear-gradient(160deg, #1e1005, #0d0800);
      border: 1px solid var(--amber);
      box-shadow: 0 0 0 3px var(--leather), 0 0 60px rgba(196,122,43,0.3);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(0.94); }
      to   { opacity:1; transform:scale(1); }
    }
    .horse-modal.legendary-modal {
      border-color: #b07ae8;
      box-shadow: 0 0 0 3px rgba(40,20,60,0.8), 0 0 60px rgba(122,74,191,0.4);
    }
    .modal-img-side {
      aspect-ratio: 1;
      overflow: hidden;
    }
    .modal-img-side img {
      width:100%; height:100%; object-fit:cover;
      filter: brightness(1.05) contrast(1.05);
    }
    .modal-info-side {
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid rgba(196,122,43,0.2);
    }
    .modal-category {
      font-family: var(--font-type);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.4rem;
    }
    .modal-horse-name {
      font-family: var(--font-title);
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: var(--gold);
      line-height: 1.2;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(196,122,43,0.3);
    }
    .modal-coat {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--dust);
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(196,122,43,0.2);
    }
    .modal-divider {
      display:flex; align-items:center; gap:0.5rem;
      color:var(--amber); font-size:0.65rem; margin-bottom:1rem;
    }
    .modal-divider::before, .modal-divider::after {
      content:''; flex:1; height:1px; background:var(--amber); opacity:0.3;
    }
    .modal-desc {
      font-family: var(--font-type);
      font-size: 0.78rem;
      color: rgba(200,176,128,0.7);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .modal-close {
      align-self: flex-start;
      padding: 0.5rem 1.25rem;
      border: 1px solid rgba(196,122,43,0.4);
      background: transparent;
      color: var(--dust);
      font-family: var(--font-head);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-close:hover { border-color: var(--amber); color: var(--gold); }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--dirt); }
    ::-webkit-scrollbar-thumb { background:var(--leather); border-radius:2px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--amber); }

    /* Stopka */
    #site-footer {
      position: fixed; bottom: 1rem; right: 1.25rem; z-index: 100;
      display:flex; align-items:center; gap:0.5rem;
      padding:0.35rem 0.85rem;
      background:rgba(16,10,2,0.9);
      border:1px solid rgba(196,122,43,0.3);
    }
    .footer-name {
      font-family:var(--font-head); font-size:0.7rem; font-weight:700;
      letter-spacing:0.2em; color:var(--dust); text-transform:uppercase;
    }
    .footer-ornament { font-size:0.45rem; color:var(--amber); opacity:0.7; }

    /* Responsive */
    @media(max-width: 900px) {
      .page { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow:auto; }
      html, body { overflow:auto; }
      .left-panel { padding:2rem 1.5rem; border-right:none; border-bottom:1px solid var(--amber); }
      .right-panel { min-height:80vh; }
      .horse-modal { grid-template-columns:1fr; }
      .modal-img-side { aspect-ratio:16/9; }
    }
  </style>
</head>
<body>

<!-- MODAL PODGLĄDU KONIA -->
<div class="horse-modal-overlay" id="horse-modal-overlay" onclick="closeModal(event)">
  <div class="horse-modal" id="horse-modal">
    <div class="modal-img-side">
      <img id="modal-img" src="" alt=""/>
    </div>
    <div class="modal-info-side">
      <div class="modal-category" id="modal-category">Muły</div>
      <div class="modal-horse-name" id="modal-name">—</div>
      <div class="modal-coat" id="modal-coat">—</div>
      <div class="modal-divider">✦ umaszczenie ✦</div>
      <div class="modal-desc" id="modal-desc">—</div>
      <button class="modal-close" onclick="document.getElementById('horse-modal-overlay').classList.remove('open')">
        ← Zamknij
      </button>
    </div>
  </div>
</div>

<!-- STOPKA -->
<div id="site-footer">
  <span class="footer-ornament">✦</span>
  <span class="footer-name">Jack Miller</span>
  <span class="footer-ornament">✦</span>
</div>

<div class="page">

  <!-- ══ LEWA — LOGOWANIE ══ -->
  <div class="left-panel">
    <div class="login-box">
      <div class="login-seal">🤠</div>
      <div class="login-title">Stajnia Strawberry</div>
      <div class="login-sub">System Zarządzania · A.D. 1905</div>
      <div class="login-divider">✦ zaloguj się ✦</div>

      <input class="login-input" type="email"    id="login-email" placeholder="Adres e-mail..."  autocomplete="email"/>
      <input class="login-input" type="password" id="login-pass"  placeholder="Hasło dostępu..." autocomplete="current-password"/>
      <div class="login-error" id="login-error"></div>
      <button class="login-submit" id="login-btn" onclick="doLogin()">Wejdź do Stajni</button>

      <a href="index.html" class="panel-link">→ Panel pracownika</a>

      <div class="login-footer">Nie masz konta? Skontaktuj się z właścicielem.</div>
    </div>
  </div>

  <!-- ══ PRAWA — KATALOG ══ -->
  <div class="right-panel">
    <div class="catalog-header">
      <div class="catalog-title">Katalog Koni</div>
      <div class="catalog-subtitle">Stajnia Strawberry · Wybierz umaszczenie</div>
    </div>

    <!-- Nawigacja kategorii -->
    <div class="cat-nav" id="cat-nav">
      <button class="cat-btn active" onclick="showCategory('muly', this)">🐴 Muły</button>
      <!-- Tu będą kolejne kategorie -->
    </div>

    <!-- Siatka koni -->
    <div class="horses-grid-wrap" id="horses-grid-wrap">
      <!-- Wypełniane przez JS -->
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyC-ONjc-zKqbq6_ojQyTu7rPWm7iK5aZro",
    authDomain:        "stajniastrawberry.firebaseapp.com",
    projectId:         "stajniastrawberry",
    storageBucket:     "stajniastrawberry.firebasestorage.app",
    messagingSenderId: "832282119818",
    appId:             "1:832282119818:web:e92e2c18dc1fb01bbaa773"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  /* Jeśli już zalogowany — przekieruj do panelu */
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'index.html';
  });

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    err.style.display = 'none';
    if (!email || !pass) { showErr('Wypełnij oba pola.'); return; }
    btn.disabled = true; btn.textContent = 'Sprawdzam...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = 'index.html';
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Wejdź do Stajni';
      const msgs = {
        'auth/invalid-email':      'Nieprawidłowy adres e-mail.',
        'auth/user-not-found':     'Nie znaleziono konta.',
        'auth/wrong-password':     'Błędne hasło.',
        'auth/invalid-credential': 'Błędne dane logowania.',
        'auth/too-many-requests':  'Za dużo prób. Odczekaj.',
        'auth/user-disabled':      'To konto zostało zablokowane.',
      };
      showErr(msgs[e.code] || e.message);
    }
  };

  function showErr(msg) {
    const e = document.getElementById('login-error');
    e.textContent = '⚠ ' + msg; e.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>

<script>
/* ══════════════════════════════════════

/* ── Render ── */
function showCategory(catId, btn) {
  /* Aktywny przycisk */
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const cat  = HORSES[catId];
  if (!cat) return;
  const wrap = document.getElementById('horses-grid-wrap');

  wrap.innerHTML = `
    <div class="category-label">${cat.icon} ${cat.label}</div>
    <p style="font-family:var(--font-type);font-size:0.75rem;color:var(--dust);margin-bottom:1.25rem;line-height:1.6">${cat.desc}</p>
    <div class="horses-grid">
      ${cat.konie.map(h => `
        <div class="horse-card ${h.legendary ? 'legendary' : ''}"
          onclick="openModal('${catId}','${h.id}')">
          ${h.legendary ? '<div class="horse-badge badge-legendary">⭐ Legendarny</div>' : ''}
          <div class="horse-img-wrap">
            <img src="${h.img}" alt="${h.name}" loading="lazy"/>
          </div>
          <div class="horse-info">
            <div class="horse-name">${h.name}</div>
            <div class="horse-coat">${h.coat}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

window.openModal = function(catId, horseId) {
  const cat   = HORSES[catId];
  const horse = cat?.konie.find(h => h.id === horseId);
  if (!horse) return;

  document.getElementById('modal-img').src       = horse.img;
  document.getElementById('modal-img').alt       = horse.name;
  document.getElementById('modal-category').textContent = cat.label;
  document.getElementById('modal-name').textContent     = horse.name;
  document.getElementById('modal-coat').textContent     = horse.coat;
  document.getElementById('modal-desc').textContent     = horse.desc;

  const modal = document.getElementById('horse-modal');
  modal.className = 'horse-modal' + (horse.legendary ? ' legendary-modal' : '');
  document.getElementById('horse-modal-overlay').classList.add('open');
};

window.closeModal = function(e) {
  if (e.target === document.getElementById('horse-modal-overlay')) {
    document.getElementById('horse-modal-overlay').classList.remove('open');
  }
};

window.showCategory = showCategory;

document.addEventListener('keydown', e => {

});
