<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strona w budowie</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #e8c547;
      --muted: #3a3a3a;
      --stripe: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Diagonal stripes background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        var(--bg) 0px,
        var(--bg) 40px,
        var(--stripe) 40px,
        var(--stripe) 80px
      );
      opacity: 0.6;
      z-index: 0;
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      width: 100%;
      animation: fadeUp 1s ease both;
    }

    /* Tape banner at top */
    .tape {
      display: inline-block;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      padding: 0.35rem 1.4rem;
      margin-bottom: 2.5rem;
      transform: rotate(-1.5deg);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
      animation: fadeUp 1s ease 0.15s both;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.2rem;
      display: block;
      animation: spin 8s linear infinite;
      filter: drop-shadow(0 0 18px rgba(232, 197, 71, 0.35));
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 8rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--fg);
      margin-bottom: 0.6rem;
      animation: fadeUp 1s ease 0.3s both;
    }

    h1 span {
      color: var(--accent);
      display: block;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
      animation: fadeUp 1s ease 0.45s both;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 3rem;
      animation: fadeUp 1s ease 0.6s both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      height: 6px;
      background: var(--muted);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #f5a623);
      border-radius: 999px;
      animation: fillBar 2s cubic-bezier(0.4, 0, 0.2, 1) 1s forwards;
    }

    /* Contact line */
    .contact {
      font-size: 0.85rem;
      color: #444;
      animation: fadeUp 1s ease 0.75s both;
    }

    .contact a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 197, 71, 0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .contact a:hover { border-color: var(--accent); }

    /* Corner accents */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 1;
      opacity: 0.25;
    }
    .corner--tl { top: 24px; left: 24px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner--tr { top: 24px; right: 24px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .corner--bl { bottom: 24px; left: 24px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner--br { bottom: 24px; right: 24px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* Ticker */
    .ticker-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--accent);
      color: #0a0a0a;
      overflow: hidden;
      padding: 0.5rem 0;
      z-index: 2;
    }

    .ticker {
      display: flex;
      white-space: nowrap;
      animation: ticker 18s linear infinite;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      gap: 3rem;
    }

    .ticker span { padding-right: 3rem; }

    /* Keyframes */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes fillBar {
      to { width: 67%; }
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">
    <div class="tape">⚙ &nbsp;Uwaga &nbsp;⚙</div>

    <span class="icon">⚙</span>

    <h1>STRONA<span>W BUDOWIE</span></h1>

    <p class="subtitle">Pracujemy nad czymś wyjątkowym. Wróć wkrótce.</p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Postęp prac</span>
        <span id="pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill"></div>
      </div>
    </div>

    <p class="contact">
      Masz pytania? Napisz na: <a href="https://discord.gg/gWNU7q5M">Discord</a></a>
    </p>
  </div>

  <div class="ticker-wrap">
    <div class="ticker">
      <span>STRONA W BUDOWIE</span>
      <span>•</span>
      <span>WRÓĆ WKRÓTCE</span>
      <span>•</span>
      <span>UNDER CONSTRUCTION</span>
      <span>•</span>
      <span>COMING SOON</span>
      <span>•</span>
      <span>STRONA W BUDOWIE</span>
      <span>•</span>
      <span>WRÓĆ WKRÓTCE</span>
      <span>•</span>
      <span>UNDER CONSTRUCTION</span>
      <span>•</span>
      <span>COMING SOON</span>
      <span>•</span>
    </div>
  </div>

  <script>
    // Animate the percentage counter alongside the progress bar
    const pct = document.getElementById('pct');
    const target = 67;
    const duration = 2000;
    const start = performance.now() + 1000;

    function tick(now) {
      const elapsed = Math.max(0, now - start);
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      pct.textContent = Math.round(eased * target) + '%';
      if (progress < 1) requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
